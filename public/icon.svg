<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6495ED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A084CA;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="url(#iconGrad)" />

  <!-- Shield/Security icon -->
  <path d="M 256 120 L 340 150 L 340 240 Q 340 320 256 380 Q 172 320 172 240 L 172 150 Z"
        fill="white" opacity="0.95" stroke="white" stroke-width="4" />

  <!-- Lock icon inside shield -->
  <rect x="236" y="250" width="40" height="60" rx="4" fill="#6495ED" />
  <path d="M 236 250 L 236 230 Q 236 210 256 210 Q 276 210 276 230 L 276 250"
        fill="none" stroke="#6495ED" stroke-width="8" stroke-linecap="round" />

  <!-- Keyhole -->
  <circle cx="256" cy="270" r="8" fill="white" />
  <rect x="252" y="278" width="8" height="16" fill="white" />
</svg>
